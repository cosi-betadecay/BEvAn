[project]
name = "trial"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.11.*"
dependencies = [
    "logging>=0.4.9.6",
    "numpy>=2.3.5",
    "ruff>=0.12.11",
    "torch==2.5.1",
    "torchvision==0.20.1",
    "torchaudio==2.5.1",
    "wandb>=0.23.0",
    "weave>=0.52.17",
    "seaborn>=0.13.2",
    "matplotlib>=3.10.7",
    "pytest>=9.0.1",
    "pytest-cov>=7.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
# E/F/W: pycodestyle/pyflakes warnings; D: pydocstyle for docstrings; I: isort import order.
select = ["E", "F", "W", "D", "I"]
# Relax module/package docstring requirements; adjust as needed.
ignore = ["D100", "D104"]
per-file-ignores = { "tests/*" = ["D"] }

[tool.ruff.lint.isort]
known-first-party = ["beta_decay", "physics", "utils"]
lines-after-imports = 1

[tool.ruff.lint.pydocstyle]
convention = "google"
