name: Build COSI SIF Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-sif:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t cosi:latest .

    - name: Install Apptainer
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libseccomp-dev \
          pkg-config \
          squashfs-tools \
          cryptsetup \
          wget
        export VERSION=1.3.2
        wget https://github.com/apptainer/apptainer/releases/download/v${VERSION}/apptainer_${VERSION}_amd64.deb
        sudo dpkg -i apptainer_${VERSION}_amd64.deb

    - name: Build SIF from Docker image
      run: |
        apptainer build cosi.sif docker-daemon://cosi:latest

    - name: Upload SIF artifact
      uses: actions/upload-artifact@v4
      with:
        name: cosi-sif
        path: cosi.sif